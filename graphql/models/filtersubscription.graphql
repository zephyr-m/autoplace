type FilterSubscription {
    id: ID!
    user_identifier: String!
    filter: JSON!
    status: Int!
    created_at: DateTime
    updated_at: DateTime
    notifications: [Notification] @hasMany
}
extend type Query {
    "Find a filter_subscription by an identifying attribute."
    filter_subscription(
        "Search by primary key or column."
        id: ID! @eq
    ): FilterSubscription @find

    "List multiple filter_subscription."
    filter_subscriptions(
        user_identifier: String @where(operator: "like") 
        status: Int @where(operator: "like")
    ): [FilterSubscription!]! @orderBy(column: "created_at", direction: DESC) @paginate(defaultCount: 10)
}
extend type Mutation {
    createFilterSubscription(user_identifier: String!, filter: JSON!, status: Int!): FilterSubscription @field(resolver: "App\\GraphQL\\Mutations\\CreateFilterSubscription")
    updateFilterSubscription(id: ID, user_identifier: String!, filter: JSON!, status: Int!): FilterSubscription @update
    deleteFilterSubscription(id: ID): FilterSubscription @delete
}
