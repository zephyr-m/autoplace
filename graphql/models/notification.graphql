type Notification {
    id: ID!
    subscription_id: Int!
    vehicle_id: Int!
    type: String!
    channel: String
    status: Int!
    payload: JSON
    sent_at: DateTime
    read_at: DateTime
    created_at: DateTime
    updated_at: DateTime
    subscription: FilterSubscription @belongsTo
    vehicle: CatalogVehicle @belongsTo
}
extend type Query {
    "Find a notification by an identifying attribute."
    notification(
        "Search by primary key or column."
        id: ID! @eq
    ): Notification @find

    "List multiple notification."
    notifications(
        subscription_id: Int @where(operator: "like") 
        vehicle_id: Int @where(operator: "like") 
        type: String @where(operator: "like") 
        channel: String @where(operator: "like") 
        status: Int @where(operator: "like") 
        sent_at: DateTime @where(operator: "like") 
        read_at: DateTime @where(operator: "like")
    ): [Notification!]! @paginate(defaultCount: 10)

    user_notifications(
        user_identifier: String!
        limit: Int = 50
    ): [Notification!]! @field(resolver: "App\\GraphQL\\Queries\\UserNotifications")
}
extend type Mutation {
    createNotification(subscription_id: Int!, vehicle_id: Int!, type: String!, channel: String, status: Int!, payload: JSON, sent_at: DateTime, read_at: DateTime): Notification @create
    updateNotification(id: ID, subscription_id: Int!, vehicle_id: Int!, type: String!, channel: String, status: Int!, payload: JSON, sent_at: DateTime, read_at: DateTime): Notification @update
    deleteNotification(id: ID): Notification @delete
    markUserNotificationsRead(user_identifier: String!): Int! @field(resolver: "App\\GraphQL\\Mutations\\MarkUserNotificationsRead")
}
